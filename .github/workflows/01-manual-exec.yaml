# CI de Nível 01 - Disparo Manual através de clique

# nome da pipeline
name: "Execução Manual"

# gatilhos / triggers - regras de disparo
## gatilho manual = workflow_dispatch

on:
  workflow_dispatch:

# tarefas dentro da pipeline = jobs

jobs:
  # nome do job
  e2e-tests:
    # maquina onde o job vai rodar
    runs-on: ubuntu-latest

    # passos do job
    steps:
      # clone do projeto
      - uses: actions/checkout@v4

      # instalação do node
      - uses: actions/setup-node@v4
        with:
          node-version: 24.x

      # instalação do Yarn
      - name: Instalando Yarn
        run: npm install -g yarn 

      # instalação das dependências
      - name: instalando das dependências
        run: yarn

      # instalação dos browser do Playwright
      - name: instalando browser do Playwright
        run: yarn playwright install

      # execução dos testes e2e
      - name: Executando os testes e2e
        run: yarn run e2e  

      # exibe resultado dos testes
      - name: Publicar Resultados dos Testes
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()  # Executa sempre, mesmo se testes falharem
        with:
          files: |
            results.xml
            test-results/**/*.xml
          check_name: "E2E Test Results"
          comment_mode: "always"